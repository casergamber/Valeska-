<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Aufgaben">
<title>Aufgaben</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f4efe6;
    --paper-2: #fbf8f1;
    --ink: #211d18;
    --ink-soft: #6b6359;
    --line: #e2d9c9;
    --accent: #c5562e;
    --accent-soft: #e8c9b8;
    --done: #a59c8e;
    --shadow: rgba(40, 32, 22, 0.12);
    --green: #5b7a4e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Hanken Grotesk', sans-serif;
    overscroll-behavior: none;
  }

  body {
    background-image:
      radial-gradient(circle at 12% 18%, rgba(197,86,46,0.05), transparent 40%),
      radial-gradient(circle at 88% 88%, rgba(91,122,78,0.05), transparent 42%);
    display: flex;
    justify-content: center;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }

  .app {
    width: 100%;
    max-width: 540px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 32px 22px 140px;
    position: relative;
  }

  /* ---- Header ---- */
  header { margin-bottom: 26px; }

  .date {
    font-size: 0.74rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 600;
    margin-bottom: 6px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 2.7rem;
    line-height: 1.02;
    letter-spacing: -0.02em;
  }

  h1 .em { font-style: italic; color: var(--accent); }

  .progress {
    margin-top: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .bar {
    flex: 1;
    height: 7px;
    background: var(--line);
    border-radius: 99px;
    overflow: hidden;
  }

  .bar > span {
    display: block;
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), #e0834f);
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.22,1,0.36,1);
  }

  .count {
    font-size: 0.8rem;
    color: var(--ink-soft);
    font-weight: 600;
    white-space: nowrap;
  }

  /* ---- Filters ---- */
  .filters {
    display: flex;
    gap: 6px;
    margin-bottom: 18px;
  }

  .filters button {
    border: none;
    background: transparent;
    color: var(--ink-soft);
    font-family: inherit;
    font-weight: 600;
    font-size: 0.84rem;
    padding: 7px 14px;
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .filters button.active {
    background: var(--ink);
    color: var(--paper-2);
  }

  /* ---- List ---- */
  ul { list-style: none; }

  .item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 15px 16px;
    margin-bottom: 10px;
    box-shadow: 0 2px 8px var(--shadow);
    animation: pop 0.35s cubic-bezier(0.22,1,0.36,1);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  @keyframes pop {
    from { opacity: 0; transform: translateY(8px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .item.removing {
    opacity: 0;
    transform: translateX(40px);
  }

  .check {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid var(--accent-soft);
    margin-top: 1px;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: all 0.2s ease;
    background: transparent;
    position: relative;
  }

  .check svg {
    width: 13px; height: 13px;
    stroke: var(--paper-2);
    stroke-width: 3.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 20;
    stroke-dashoffset: 20;
    transition: stroke-dashoffset 0.25s ease 0.05s;
  }

  .item.done .check {
    background: var(--green);
    border-color: var(--green);
  }
  .item.done .check svg { stroke-dashoffset: 0; }

  .label {
    flex: 1;
    font-size: 1.02rem;
    line-height: 1.4;
    word-break: break-word;
    cursor: text;
    transition: color 0.25s ease;
    padding-top: 1px;
  }

  .item.done .label {
    color: var(--done);
    text-decoration: line-through;
    text-decoration-thickness: 1.5px;
  }

  .label[contenteditable="true"] {
    outline: none;
    border-bottom: 1.5px dashed var(--accent);
  }

  .star {
    flex-shrink: 0;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.05rem;
    line-height: 1;
    color: var(--line);
    padding: 2px;
    transition: transform 0.15s ease, color 0.2s ease;
  }
  .star.on { color: var(--accent); }
  .star:active { transform: scale(1.3); }

  .item.important {
    border-color: var(--accent-soft);
    box-shadow: 0 2px 10px rgba(197,86,46,0.14);
  }

  .del {
    flex-shrink: 0;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--line);
    padding: 2px;
    transition: color 0.2s ease;
  }
  .del:hover, .del:active { color: var(--accent); }
  .del svg { width: 17px; height: 17px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; }

  /* ---- Empty state ---- */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-soft);
  }
  .empty .mark {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 3rem;
    color: var(--accent-soft);
    margin-bottom: 8px;
  }
  .empty p { font-size: 0.95rem; }

  /* ---- Footer actions ---- */
  .footer-tools {
    margin-top: 6px;
    text-align: center;
  }
  .clear-done {
    background: none;
    border: none;
    color: var(--ink-soft);
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    padding: 8px;
    text-decoration: underline;
    text-underline-offset: 3px;
    opacity: 0.7;
  }
  .clear-done:hover { opacity: 1; color: var(--accent); }

  /* ---- Add bar ---- */
  .add-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    justify-content: center;
    padding: 16px 22px calc(16px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, var(--paper) 55%, transparent);
    pointer-events: none;
  }

  .add-inner {
    width: 100%;
    max-width: 496px;
    display: flex;
    gap: 10px;
    pointer-events: auto;
  }

  #input {
    flex: 1;
    border: 1px solid var(--line);
    background: var(--paper-2);
    border-radius: 16px;
    padding: 16px 18px;
    font-family: inherit;
    font-size: 1rem;
    color: var(--ink);
    box-shadow: 0 6px 20px var(--shadow);
    transition: border-color 0.2s ease;
  }
  #input::placeholder { color: var(--ink-soft); }
  #input:focus { outline: none; border-color: var(--accent); }

  .add-btn {
    flex-shrink: 0;
    width: 54px;
    border: none;
    background: var(--accent);
    color: var(--paper-2);
    border-radius: 16px;
    font-size: 1.6rem;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(197,86,46,0.35);
    transition: transform 0.12s ease, background 0.2s ease;
    display: grid;
    place-items: center;
  }
  .add-btn:active { transform: scale(0.92); background: #ad481f; }

  .loading { text-align: center; color: var(--ink-soft); padding: 40px; font-size: 0.9rem; }
</style>
</head>
<body>
  <div class="app">
    <header>
      <div class="date" id="date"></div>
      <h1>Meine <span class="em">Aufgaben</span></h1>
      <div class="progress">
        <div class="bar"><span id="barFill"></span></div>
        <div class="count" id="count">–</div>
      </div>
    </header>

    <div class="filters">
      <button data-filter="all" class="active">Alle</button>
      <button data-filter="active">Offen</button>
      <button data-filter="done">Erledigt</button>
    </div>

    <ul id="list"></ul>
    <div class="loading" id="loading">Lade deine Aufgaben…</div>

    <div class="footer-tools" id="footerTools" style="display:none">
      <button class="clear-done" id="clearDone">Erledigte aufräumen</button>
    </div>
  </div>

  <div class="add-bar">
    <div class="add-inner">
      <input id="input" type="text" placeholder="Neue Aufgabe…" autocomplete="off" enterkeyhint="done">
      <button class="add-btn" id="addBtn" aria-label="Hinzufügen">+</button>
    </div>
  </div>

<script>
(function () {
  const KEY = 'todos:list:v1';
  let todos = [];
  let filter = 'all';
  let ready = false;

  const $list = document.getElementById('list');
  const $input = document.getElementById('input');
  const $loading = document.getElementById('loading');
  const $footerTools = document.getElementById('footerTools');

  // Datum
  document.getElementById('date').textContent =
    new Date().toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });

  // ---- Speicher (mit Fallback, falls window.storage nicht da ist) ----
  const hasStore = typeof window !== 'undefined' && window.storage && typeof window.storage.get === 'function';
  let memFallback = [];

  async function load() {
    if (hasStore) {
      try {
        const res = await window.storage.get(KEY);
        if (res && res.value) todos = JSON.parse(res.value);
      } catch (e) { /* erster Start: Schlüssel existiert noch nicht */ }
    } else {
      todos = memFallback;
    }
  }

  async function save() {
    if (hasStore) {
      try { await window.storage.set(KEY, JSON.stringify(todos)); }
      catch (e) { console.error('Speichern fehlgeschlagen', e); }
    } else {
      memFallback = todos;
    }
  }

  // ---- Render ----
  const checkSvg = '<svg viewBox="0 0 24 24"><polyline points="4 13 9 18 20 6"/></svg>';
  const trashSvg = '<svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>';

  function visible() {
    if (filter === 'active') return todos.filter(t => !t.done);
    if (filter === 'done') return todos.filter(t => t.done);
    return todos;
  }

  function render() {
    if (!ready) return;
    $loading.style.display = 'none';
    const items = visible();
    const total = todos.length;
    const done = todos.filter(t => t.done).length;

    // Fortschritt
    document.getElementById('barFill').style.width = total ? (done / total * 100) + '%' : '0%';
    document.getElementById('count').textContent =
      total === 0 ? '0 Aufgaben' : done + ' / ' + total + ' erledigt';

    $footerTools.style.display = done > 0 ? 'block' : 'none';

    $list.innerHTML = '';

    if (items.length === 0) {
      const msg = total === 0
        ? 'Noch nichts geplant.<br>Tipp unten etwas ein.'
        : (filter === 'done' ? 'Noch nichts erledigt.' : 'Alles erledigt — stark!');
      $list.innerHTML = '<div class="empty"><div class="mark">~</div><p>' + msg + '</p></div>';
      return;
    }

    // wichtige zuerst, dann offene, erledigte ans Ende
    const sorted = [...items].sort((a, b) =>
      (a.done - b.done) || (b.important - a.important) || (a.created - b.created));

    sorted.forEach(t => {
      const li = document.createElement('li');
      li.className = 'item' + (t.done ? ' done' : '') + (t.important ? ' important' : '');
      li.dataset.id = t.id;

      const check = document.createElement('button');
      check.className = 'check';
      check.innerHTML = checkSvg;
      check.onclick = () => toggle(t.id);

      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = t.text;
      label.title = 'Tippen zum Bearbeiten';
      label.onclick = () => beginEdit(label, t.id);

      const star = document.createElement('button');
      star.className = 'star' + (t.important ? ' on' : '');
      star.textContent = t.important ? '★' : '☆';
      star.title = 'Wichtig markieren';
      star.onclick = () => star_toggle(t.id);

      const del = document.createElement('button');
      del.className = 'del';
      del.innerHTML = trashSvg;
      del.title = 'Löschen';
      del.onclick = () => remove(t.id, li);

      li.append(check, label, star, del);
      $list.appendChild(li);
    });
  }

  // ---- Aktionen ----
  function add(text) {
    text = text.trim();
    if (!text) return;
    todos.push({ id: Date.now() + '-' + Math.random().toString(36).slice(2,6),
                 text, done: false, important: false, created: Date.now() });
    save(); render();
  }

  function toggle(id) {
    const t = todos.find(x => x.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function star_toggle(id) {
    const t = todos.find(x => x.id === id);
    if (t) { t.important = !t.important; save(); render(); }
  }

  function remove(id, li) {
    if (li) {
      li.classList.add('removing');
      setTimeout(() => { todos = todos.filter(x => x.id !== id); save(); render(); }, 250);
    } else {
      todos = todos.filter(x => x.id !== id); save(); render();
    }
  }

  function beginEdit(label, id) {
    if (label.isContentEditable) return;
    label.contentEditable = 'true';
    label.focus();
    const range = document.createRange();
    range.selectNodeContents(label);
    const sel = window.getSelection();
    sel.removeAllRanges(); sel.addRange(range);

    const finish = () => {
      label.contentEditable = 'false';
      label.removeEventListener('blur', finish);
      const t = todos.find(x => x.id === id);
      const val = label.textContent.trim();
      if (t) {
        if (val) { t.text = val; } else { label.textContent = t.text; }
        save();
      }
    };
    label.addEventListener('blur', finish);
    label.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); label.blur(); }
    });
  }

  function clearDone() {
    todos.filter(t => t.done).forEach(t => {
      const li = $list.querySelector('[data-id="' + t.id + '"]');
      if (li) li.classList.add('removing');
    });
    setTimeout(() => { todos = todos.filter(t => !t.done); save(); render(); }, 250);
  }

  // ---- Events ----
  document.getElementById('addBtn').onclick = () => { add($input.value); $input.value = ''; $input.focus(); };
  $input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { add($input.value); $input.value = ''; }
  });
  document.getElementById('clearDone').onclick = clearDone;
  document.querySelectorAll('.filters button').forEach(b => {
    b.onclick = () => {
      filter = b.dataset.filter;
      document.querySelectorAll('.filters button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      render();
    };
  });

  // ---- Start ----
  (async () => { await load(); ready = true; render(); })();
})();
</script>
</body>
</html>
